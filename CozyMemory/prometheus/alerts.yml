groups:
  - name: cozymemory
    rules:
      - alert: EngineDown
        expr: cozy_engine_up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.engine }} engine is down"

      - alert: HighEngineLatency
        expr: cozy_engine_latency_ms > 5000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.engine }} latency above 5s ({{ $value }}ms)"

      - alert: HighEngineErrorRate
        expr: rate(cozy_engine_request_errors_total[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.engine }} error rate above 0.1/s"

      - alert: HighRequestLatencyP99
        expr: histogram_quantile(0.99, rate(cozy_engine_request_duration_seconds_bucket[5m])) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P99 request latency above 10s for {{ $labels.engine }}"

      - alert: APIDown
        expr: up{job="cozymemory-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "CozyMemory API is unreachable by Prometheus"
