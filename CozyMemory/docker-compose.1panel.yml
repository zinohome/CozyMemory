# CozyMemory 统一 Docker Compose 编排文件
# 部署前：复制 .env.example → .env 并填写实际值
# 数据存储：/data/CozyMemory/
# 网络：1panel-network（1Panel 预建外部网络）

name: cozymemory

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

services:

  # ==========================================
  # 基础设施层（无对外端口，仅内网访问）
  # ==========================================

  postgres:
    image: pgvector/pgvector:0.8.1-pg17-trixie
    container_name: cozy_postgres
    # hostname 必须唯一：1panel-network 上有另一个项目也叫 postgres
    # (cozyengine_postgres)，Docker DNS 会 round-robin 两个 IP 导致 50% 认证失败
    hostname: cozy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required (see .env.example)}
      PGDATA: /var/lib/postgresql/data/pgdata
      # 从根源确保密码使用 scram-sha-256 编码
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
      COGNEE_DB_USER: ${COGNEE_DB_USER:-cognee_user}
      COGNEE_DB_PASSWORD: ${COGNEE_DB_PASSWORD:?COGNEE_DB_PASSWORD required}
      MEMOBASE_DB_USER: ${MEMOBASE_DB_USER:-memobase}
      MEMOBASE_DB_PASSWORD: ${MEMOBASE_DB_PASSWORD:?MEMOBASE_DB_PASSWORD required}
      COZYMEMORY_DB_USER: ${COZYMEMORY_DB_USER:-cozymemory_user}
      COZYMEMORY_DB_PASSWORD: ${COZYMEMORY_DB_PASSWORD:?COZYMEMORY_DB_PASSWORD required}
    # healthcheck: init.sh 完成后创建 .init_done 标记文件 + 密码连接双重验证
    # 确保 init.sh 运行完毕且所有用户密码可用后才放行依赖服务
    healthcheck:
      test: ["CMD-SHELL", "test -f /var/lib/postgresql/data/pgdata/.init_done && PGPASSWORD=$${COGNEE_DB_PASSWORD} psql -h 127.0.0.1 -U $${COGNEE_DB_USER:-cognee_user} -d cognee_db -c 'SELECT 1' -q"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    # 暴露到 host 5433（避开 5432 的另一个 cozyenginev2 老 PG 冲突），
    # 供本地 alembic / 单元测试连接；容器间仍通过 cozy_postgres:5432
    ports:
      - "5433:5432"
    volumes:
      - /data/CozyMemory/postgres:/var/lib/postgresql/data
      - ./sql/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
    networks:
      1panel-network:
        # 显式设唯一别名，避免与同网络上其他 postgres 服务（cozyengine_postgres）DNS 冲突
        aliases:
          - cozy-pg
    logging: *default-logging
    labels:
      createdBy: "Apps"

  # 密码同步：每次 docker compose up 都将 .env 中的密码同步到 PG
  # 解决 init.sh 只在首次初始化运行、后续 .env 改密码后 PG 不同步的问题
  sync-passwords:
    image: pgvector/pgvector:0.8.1-pg17-trixie
    container_name: cozy_sync_passwords
    restart: "no"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required (see .env.example)}
      COGNEE_DB_USER: ${COGNEE_DB_USER:-cognee_user}
      COGNEE_DB_PASSWORD: ${COGNEE_DB_PASSWORD:?COGNEE_DB_PASSWORD required}
      MEMOBASE_DB_USER: ${MEMOBASE_DB_USER:-memobase}
      MEMOBASE_DB_PASSWORD: ${MEMOBASE_DB_PASSWORD:?MEMOBASE_DB_PASSWORD required}
      COZYMEMORY_DB_USER: ${COZYMEMORY_DB_USER:-cozymemory_user}
      COZYMEMORY_DB_PASSWORD: ${COZYMEMORY_DB_PASSWORD:?COZYMEMORY_DB_PASSWORD required}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./sql/sync-passwords.sh:/sync-passwords.sh:ro
    entrypoint: ["bash", "/sync-passwords.sh"]
    networks:
      - 1panel-network
    labels:
      createdBy: "Apps"

  redis:
    image: redis:7-alpine
    container_name: cozy_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required}
    volumes:
      - /data/CozyMemory/redis:/data
    networks:
      - 1panel-network
    logging: *default-logging
    labels:
      createdBy: "Apps"

  qdrant:
    image: qdrant/qdrant:v1.15
    container_name: cozy_qdrant
    restart: unless-stopped
    volumes:
      - /data/CozyMemory/qdrant:/qdrant/storage
    networks:
      - 1panel-network
    logging: *default-logging
    labels:
      createdBy: "Apps"

  minio:
    image: quay.io/minio/minio:RELEASE.2023-11-01T01-57-10Z-cpuv1
    container_name: cozy_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD required}
    volumes:
      - /data/CozyMemory/minio:/data
    networks:
      - 1panel-network
    logging: *default-logging
    labels:
      createdBy: "Apps"

  falkordb:
    image: falkordb/falkordb:latest
    container_name: cozy_falkordb
    restart: unless-stopped
    volumes:
      - /data/CozyMemory/falkordb:/data
    networks:
      - 1panel-network
    logging: *default-logging
    labels:
      createdBy: "Apps"
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m

  falkordb-browser:
    image: falkordb/falkordb-browser:latest
    container_name: cozy_falkordb_browser
    restart: unless-stopped
    environment:
      FALKORDB_URL: redis://falkordb:6379
    depends_on:
      falkordb:
        condition: service_started
    networks:
      - 1panel-network
    logging: *default-logging
    labels:
      createdBy: "Apps"
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 64m

  # ──────── Neo4j（已禁用 — 多租户模式使用 Kuzu 替代）────────
  # 如需切回 Neo4j（单用户/开发模式），取消注释本段并修改 cognee 环境变量：
  #   GRAPH_DATABASE_PROVIDER=neo4j
  #   GRAPH_DATABASE_URL=bolt://neo4j:7687
  #   GRAPH_DATABASE_USERNAME=neo4j
  #   GRAPH_DATABASE_PASSWORD=${NEO4J_PASSWORD}
  #   VECTOR_DB_PROVIDER=pgvector
  #   VECTOR_DB_URL=postgresql://${COGNEE_DB_USER:-cognee_user}:${COGNEE_DB_PASSWORD}@postgres:5432/cognee_db
  #   ENABLE_BACKEND_ACCESS_CONTROL=false
  # 同时需将 cognee 的 depends_on 中添加 neo4j
  #
  # neo4j:
  #   image: neo4j:2026.03.1
  #   container_name: cozy_neo4j
  #   restart: unless-stopped
  #   environment:
  #     NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:?NEO4J_PASSWORD required}
  #     NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
  #     NEO4J_dbms_memory_heap_initial__size: 512m
  #     NEO4J_dbms_memory_heap_max__size: 1G
  #   volumes:
  #     - /data/CozyMemory/neo4j/data:/data
  #     - /data/CozyMemory/neo4j/logs:/logs
  #     - /data/CozyMemory/neo4j/plugins:/plugins
  #   networks:
  #     - 1panel-network
  #   logging: *default-logging
  #   labels:
  #     createdBy: "Apps"
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 2g
  #       reservations:
  #         memory: 512m

  # ==========================================
  # Cognee 服务群
  # ==========================================

  cognee:
    image: cognee:0.4.1
    container_name: cozy_cognee
    restart: unless-stopped
    environment:
      - DEBUG=false
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - HOST=0.0.0.0
      - HTTP_PORT=8000
      - PYTHONUNBUFFERED=1
      - LLM_API_KEY=${LLM_API_KEY:?LLM_API_KEY required}
      - LLM_PROVIDER=openai
      # Cognee 用 LiteLLM + instructor，需要 openai/ 前缀
      # qwen3.5:cloud 的 structured output 与 instructor 兼容性最好
      - LLM_MODEL=openai/qwen3.5:cloud
      - LLM_ENDPOINT=${LLM_ENDPOINT:-http://192.168.66.163:11434/v1}
      - LLM_MAX_TOKENS=16384
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-openai}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY:-unused}
      - EMBEDDING_ENDPOINT=${EMBEDDING_ENDPOINT:-http://192.168.66.163:11434/v1}
      # Cognee 的 LiteLLM 需要 openai/ 前缀
      - EMBEDDING_MODEL=openai/${EMBEDDING_MODEL:-bge-m3}
      # EMBEDDING_DIMENSIONS 用于 LanceDB schema 定义（必须和模型输出维度匹配）
      # 补丁 patch_litellm_drop_params.py 确保不把 dimensions 传给 LiteLLM（会报错）
      - EMBEDDING_DIMENSIONS=${EMBEDDING_DIMS:-1024}
      - DATABASE_URL=postgresql://${COGNEE_DB_USER:-cognee_user}:${COGNEE_DB_PASSWORD}@cozy-pg:5432/cognee_db
      - DB_PROVIDER=postgres
      - DB_HOST=cozy-pg
      - DB_PORT=5432
      - DB_NAME=cognee_db
      - DB_USERNAME=${COGNEE_DB_USER:-cognee_user}
      - DB_PASSWORD=${COGNEE_DB_PASSWORD}
      - VECTOR_DB_PROVIDER=lancedb
      - GRAPH_DATABASE_PROVIDER=falkor
      - GRAPH_DATABASE_URL=redis://falkordb:6379
      - GRAPH_DATABASE_NAME=cognee
      - GRAPH_DATASET_DATABASE_HANDLER=falkor
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - S3_BUCKET_NAME=cognee-storage
      - S3_USE_SSL=false
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-*}
      - EXTRAS=api,postgres
      - TELEMETRY_DISABLED=1
      # 跳过 LLM 连接测试：Ollama 模型冷启动可能超过 30s 检测超时
      # LLM 实际可用（容器内 1.4s 响应），但 Cognee 内部测试超时逻辑过于严格
      - COGNEE_SKIP_CONNECTION_TEST=true
      - ENABLE_BACKEND_ACCESS_CONTROL=true
      - REQUIRE_AUTHENTICATION=false
      - DEFAULT_USER_EMAIL=admin@cognee.com
      - DEFAULT_USER_PASSWORD=${COGNEE_ADMIN_PASSWORD:-passw0rd}
      - TIKTOKEN_CACHE_DIR=/root/.tiktoken
    depends_on:
      sync-passwords:
        condition: service_completed_successfully
      redis:
        condition: service_started
      minio:
        condition: service_started
      falkordb:
        condition: service_started
    volumes:
      - /data/CozyMemory/cognee/data:/app/data
      - /data/CozyMemory/cognee/storage:/app/cognee/.data_storage
      - /data/CozyMemory/cognee/logs:/app/logs
      - /data/CozyMemory/tiktoken:/root/.tiktoken
    networks:
      - 1panel-network
    logging: *default-logging
    labels:
      createdBy: "Apps"
    deploy:
      resources:
        limits:
          memory: 2g
        reservations:
          memory: 512m

  cognee-frontend:
    image: cognee-frontend:local-0.4.1
    container_name: cozy_cognee_frontend
    restart: unless-stopped
    # cognee-frontend 跑 Next.js dev 模式，NEXT_PUBLIC_* 可在运行时注入
    environment:
      - NEXT_PUBLIC_BACKEND_API_URL=http://192.168.66.41:8080
      - NEXT_PUBLIC_LOCAL_API_URL=http://192.168.66.41:8080
      - NEXT_PUBLIC_IS_CLOUD_ENVIRONMENT=false
      - NEXT_DISABLE_DEV_INDICATORS=true
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      cognee:
        condition: service_started
    networks:
      - 1panel-network
    logging: *default-logging
    labels:
      createdBy: "Apps"
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m

  # ==========================================
  # Mem0 服务群
  # ==========================================

  mem0-api:
    image: mem0-api:latest
    container_name: cozy_mem0_api
    restart: unless-stopped
    environment:
      OPENAI_API_KEY: ${LLM_API_KEY:?LLM_API_KEY required}
      OPENAI_BASE_URL: ${LLM_ENDPOINT:-http://192.168.66.163:11434/v1}
      OPENAI_MODEL: ${LLM_MODEL:-gpt-oss:120b-cloud}
      # LLM Provider: openai（默认）或 ollama（本地推理）
      LLM_PROVIDER: ${MEM0_LLM_PROVIDER:-ollama}
      LLM_BASE_URL: ${LLM_ENDPOINT:-http://192.168.66.163:11434/v1}
      # Embedding Provider: ollama（默认，本地 91ms）或 openai
      EMBEDDER_PROVIDER: ${MEM0_EMBEDDER_PROVIDER:-ollama}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-http://192.168.66.163:11434/v1}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-unused}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-bge-m3}
      EMBEDDING_DIMS: ${EMBEDDING_DIMS:-1024}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION_NAME: memories
      HISTORY_DB_PATH: /app/history/history.db
      CORS_ORIGINS: "${CORS_ALLOWED_ORIGINS:-*}"
      # patch未生效时回退：使用 cozy_postgres 做向量存储（pgvector）
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      qdrant:
        condition: service_started
      postgres:
        condition: service_healthy
    volumes:
      - /data/CozyMemory/mem0/history:/app/history
      - /data/CozyMemory/mem0/logs:/app/logs
    networks:
      - 1panel-network
    logging: *default-logging
    labels:
      createdBy: "Apps"
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m

  mem0-webui:
    image: mem0-webui:latest
    container_name: cozy_mem0_webui
    restart: unless-stopped
    # entrypoint.sh 在启动时将 NEXT_PUBLIC_* 替换进 .next/ 编译产物
    environment:
      NEXT_PUBLIC_API_URL: http://192.168.66.41:8081
      NEXT_PUBLIC_USER_ID: user
    depends_on:
      mem0-api:
        condition: service_started
    networks:
      - 1panel-network
    logging: *default-logging
    labels:
      createdBy: "Apps"
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m

  # ==========================================
  # Memobase 服务群
  # ==========================================

  memobase-server-api:
    image: memobase-server:latest
    container_name: cozy_memobase_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${MEMOBASE_DB_USER:-memobase}:${MEMOBASE_DB_PASSWORD}@cozy-pg:5432/memobase
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      ACCESS_TOKEN: ${MEMOBASE_ACCESS_TOKEN:?MEMOBASE_ACCESS_TOKEN required}
      PROJECT_ID: default
      API_HOSTS: "http://192.168.66.41:8019,http://memobase-server-api:8000"
      USE_CORS: "true"
      MEMOBASE_LANGUAGE: zh
      MEMOBASE_LLM_STYLE: openai
      MEMOBASE_LLM_API_KEY: "${LLM_API_KEY:?LLM_API_KEY required}"
      MEMOBASE_LLM_BASE_URL: "${LLM_ENDPOINT:-http://192.168.66.163:11434/v1}"
      MEMOBASE_BEST_LLM_MODEL: "${LLM_MODEL:-gpt-oss:120b-cloud}"
      MEMOBASE_THINKING_LLM_MODEL: "${LLM_MODEL:-gpt-oss:120b-cloud}"
      MEMOBASE_EMBEDDING_API_KEY: "${EMBEDDING_API_KEY:-unused}"
      MEMOBASE_EMBEDDING_BASE_URL: "${EMBEDDING_BASE_URL:-http://192.168.66.163:11434/v1}"
      MEMOBASE_EMBEDDING_PROVIDER: openai
      MEMOBASE_EMBEDDING_MODEL: "${EMBEDDING_MODEL:-bge-m3}"
      MEMOBASE_EMBEDDING_DIM: "${EMBEDDING_DIMS:-1024}"
      TIKTOKEN_CACHE_DIR: /root/.tiktoken
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      sync-passwords:
        condition: service_completed_successfully
      redis:
        condition: service_started
    volumes:
      - /data/CozyMemory/tiktoken:/root/.tiktoken
      - /data/CozyMemory/memobase:/app/data
    networks:
      - 1panel-network
    logging: *default-logging
    labels:
      createdBy: "Apps"
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m

  # ==========================================
  # CozyMemory 统一服务层
  # ==========================================

  cozymemory-api:
    image: cozymemory:latest
    container_name: cozymemory
    restart: unless-stopped
    ports:
      - "50151:50051"  # 本机调试/测试直连；外部客户端走 Caddy:50051 (TLS)
    environment:
      APP_ENV: production
      DEBUG: "false"
      LOG_LEVEL: INFO
      # 三引擎后端（容器内网访问）
      MEM0_API_URL: http://mem0-api:8000
      MEM0_API_KEY: ""
      MEM0_ENABLED: "true"
      MEMOBASE_API_URL: http://memobase-server-api:8000
      MEMOBASE_API_KEY: ${MEMOBASE_ACCESS_TOKEN}
      MEMOBASE_ENABLED: "true"
      COGNEE_API_URL: http://cognee:8000
      COGNEE_API_KEY: ""
      COGNEE_ENABLED: "true"
      COGNEE_USER_EMAIL: admin@cognee.com
      COGNEE_USER_PASSWORD: ${COGNEE_ADMIN_PASSWORD:-passw0rd}
      # Cognee 默认搜索类型：CHUNKS(快) / GRAPH_COMPLETION(慢但有推理)
      COGNEE_DEFAULT_SEARCH_TYPE: ${COGNEE_DEFAULT_SEARCH_TYPE:-CHUNKS}
      # Redis 用于 user_id → UUID 映射（Memobase 兼容层）
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/2
      REDIS_USER_MAPPING_TTL: "0"
      # PostgreSQL 平台账号库（Organization / Developer / App / ApiKey）
      # 容器内通过 service name 解析；host 端口 5433 供本机 alembic
      DATABASE_URL: "postgresql+asyncpg://${COZYMEMORY_DB_USER:-cozymemory_user}:${COZYMEMORY_DB_PASSWORD}@cozy-pg:5432/cozymemory"
      # JWT（Dashboard 登录）— 生产必须改
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production}"
      # API Key 鉴权 — 逗号分隔多个 key；留空关闭鉴权
      COZY_API_KEYS: ${COZY_API_KEYS:-}
    depends_on:
      sync-passwords:
        condition: service_completed_successfully
      mem0-api:
        condition: service_started
      memobase-server-api:
        condition: service_started
      cognee:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - 1panel-network
    logging: *default-logging
    labels:
      createdBy: "Apps"
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m

  # ==========================================
  # CozyMemory UI
  # ==========================================

  cozymemory-ui:
    image: cozymemory-ui:latest
    container_name: cozy_ui
    restart: unless-stopped
    environment:
      # entrypoint.sh 在启动时将 __COZY_API_URL__ 替换进 .next/static/ 编译产物
      NEXT_PUBLIC_API_URL: http://192.168.66.41:8000
      # Playground 用 — server-side /api/chat 路由读取，不注入浏览器包
      LLM_ENDPOINT: ${LLM_ENDPOINT:-http://192.168.66.163:11434/v1}
      LLM_API_KEY: ${LLM_API_KEY:?LLM_API_KEY required}
      LLM_MODEL: ${LLM_MODEL:-gpt-oss:120b-cloud}
    depends_on:
      cozymemory-api:
        condition: service_started
    networks:
      - 1panel-network
    logging: *default-logging
    labels:
      createdBy: "Apps"
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m

  # ==========================================
  # Caddy 反向代理
  # ==========================================

  # ──────────────────── Observability ────────────────────

  init-data-dirs:
    image: busybox
    container_name: cozy_init_data
    restart: "no"
    volumes:
      - /data/CozyMemory/prometheus:/data/prometheus
      - /data/CozyMemory/grafana:/data/grafana
    command: sh -c "chown -R 65534:65534 /data/prometheus && chown -R 472:472 /data/grafana"
    networks:
      - 1panel-network
    labels:
      createdBy: "Apps"

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: cozy_prometheus
    restart: unless-stopped
    depends_on:
      init-data-dirs:
        condition: service_completed_successfully
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - /data/CozyMemory/prometheus:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - 1panel-network
    logging: *default-logging
    labels:
      createdBy: "Apps"

  grafana:
    image: grafana/grafana:11.4.0
    container_name: cozy_grafana
    restart: unless-stopped
    depends_on:
      init-data-dirs:
        condition: service_completed_successfully
      prometheus:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-cozyadmin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - /data/CozyMemory/grafana:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - 1panel-network
    logging: *default-logging
    labels:
      createdBy: "Apps"

  caddy:
    image: caddy:alpine
    container_name: cozy_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "8000:8000"
      - "8080:8080"
      - "8081:8081"
      - "8019:8019"
      - "8085:8085"
      - "8088:8088"
      - "3001:3001"
      - "50051:50051"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./nav:/srv/nav:ro
      - /data/CozyMemory/caddy/data:/data
      - /data/CozyMemory/caddy/config:/config
    depends_on:
      cognee:
        condition: service_started
      cognee-frontend:
        condition: service_started
      mem0-api:
        condition: service_started
      mem0-webui:
        condition: service_started
      memobase-server-api:
        condition: service_started
      cozymemory-api:
        condition: service_started
      cozymemory-ui:
        condition: service_started
      falkordb-browser:
        condition: service_started
      grafana:
        condition: service_started
    networks:
      - 1panel-network
    logging: *default-logging
    labels:
      createdBy: "Apps"

networks:
  1panel-network:
    external: true
