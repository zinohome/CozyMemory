name: Daily Security Scan

# 每天凌晨 2 点 UTC 运行 (北京时间 10 点)
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:  # 支持手动触发

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ==================== 依赖漏洞扫描 ====================
  dependency-scan:
    name: 🔍 依赖漏洞扫描
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install safety pip-audit

      - name: 🧪 Safety 漏洞扫描
        run: |
          safety check --json > safety-report.json || true
          cat safety-report.json | python -m json.tool

      - name: 🧪 Pip Audit 漏洞扫描
        run: |
          pip-audit --desc -f json > pip-audit-report.json || true
          cat pip-audit-report.json | python -m json.tool

      - name: 📊 上传 Safety 报告
        uses: actions/upload-artifact@v4
        with:
          name: safety-daily-report
          path: safety-report.json
          retention-days: 30

      - name: 📊 上传 Pip Audit 报告
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-daily-report
          path: pip-audit-report.json
          retention-days: 30

      - name: 🔔 发现高危漏洞时发送通知
        if: failure()
        run: |
          echo "⚠️ 发现高危漏洞！请立即处理。"
          echo "详见：https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  # ==================== 代码质量扫描 ====================
  code-quality:
    name: 📊 代码质量扫描
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史用于 SonarCloud

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 安装依赖
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install pytest pytest-cov

      - name: 🧪 运行测试并生成覆盖率报告
        run: |
          pytest --cov=src --cov-report=xml --cov-report=html

      - name: 📊 SonarCloud 扫描
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ github.repository }}
            -Dsonar.organization=${{ github.repository_owner }}
            -Dsonar.sources=src/
            -Dsonar.tests=tests/
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.python.version=3.11

  # ==================== 生成日报 ====================
  daily-report:
    name: 📋 生成日报
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [dependency-scan, code-quality]
    if: always()
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 📝 生成日报内容
        run: |
          cat > daily-report.md << 'EOF'
          # CozyMemory 每日安全与质量日报

          **日期**: ${{ github.event.schedule }}
          **仓库**: ${{ github.repository }}
          **分支**: ${{ github.ref }}

          ## 扫描结果

          ### 依赖漏洞扫描
          - Safety: 详见 [报告](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          - Pip Audit: 详见 [报告](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

          ### 代码质量扫描
          - SonarCloud: 详见 [Dashboard](https://sonarcloud.io/project/overview?id=${{ github.repository }})

          ## 行动项

          - [ ] 检查高危漏洞 (如有)
          - [ ] 审查代码质量趋势
          - [ ] 更新依赖版本 (如有需要)

          ---
          *此报告由 GitHub Actions 自动生成*
          EOF

      - name: 📊 上传日报
        uses: actions/upload-artifact@v4
        with:
          name: daily-report
          path: daily-report.md
          retention-days: 30
