# CozyMemory 统一 1Panel Docker Compose 编排文件
# 适用于1Panel面板的Docker Compose配置
# 注意：使用外部网络 1panel-network，所有数据存储在 /data/cozy-memory 目录

version: '3.8'

services:
  # ==========================================
  # 统一基础设施层 (Unified Infrastructure)
  # 无任何对外端口暴露，仅限 1panel-network 内部访问
  # ==========================================

  # 1. 统一 PostgreSQL 数据库
  postgres:
    image: pgvector/pgvector:0.8.1-pg17-trixie
    container_name: cozy_postgres
    restart: unless-stopped
    environment:
      # ROOT 用户密码（由 init.sql 负责后续的权限划分和库创建）
      - POSTGRES_PASSWORD=${POSTGRES_ROOT_PASSWORD}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - ${DATA_PATH}/postgres:/var/lib/postgresql/data
      # 挂载初始化脚本，第一次启动时自动创建 cognee_db 和 memobase 逻辑库
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - 1panel-network
    labels:
      createdBy: "Apps"

  # 2. 统一 Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: cozy_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - ${DATA_PATH}/redis:/data
    networks:
      - 1panel-network
    labels:
      createdBy: "Apps"

  # 3. 统一 Qdrant 向量数据库 (Mem0 专用)
  qdrant:
    image: qdrant/qdrant:v1.15
    container_name: cozy_qdrant
    restart: unless-stopped
    volumes:
      - ${DATA_PATH}/qdrant:/qdrant/storage
    networks:
      - 1panel-network
    labels:
      createdBy: "Apps"

  # 4. 统一 MinIO 对象存储 (Cognee 专用)
  minio:
    image: quay.io/minio/minio:RELEASE.2023-11-01T01-57-10Z-cpuv1
    container_name: cozy_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - ${DATA_PATH}/minio:/data
    networks:
      - 1panel-network
    labels:
      createdBy: "Apps"

  # 5. 统一 Neo4j 图数据库 (Cognee 专用)
  neo4j:
    image: neo4j:latest
    container_name: cozy_neo4j
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/pleaseletmein
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=1G
    volumes:
      - ${DATA_PATH}/neo4j/data:/data
      - ${DATA_PATH}/neo4j/logs:/logs
      - ${DATA_PATH}/neo4j/import:/var/lib/neo4j/import
      - ${DATA_PATH}/neo4j/plugins:/plugins
    networks:
      - 1panel-network
    labels:
      createdBy: "Apps"
    deploy:
      resources:
        limits:
          memory: 2g
        reservations:
          memory: 512m

  # ==========================================
  # CozyMem0 核心服务群
  # ==========================================

  mem0-api:
    image: mem0-api:latest
    container_name: mem0-api
    restart: unless-stopped
    ports:
      - "8888:8000"
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-your-openai-api-key-here}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-nano-2025-04-14}
      CUSTOM_FACT_EXTRACTION_PROMPT: ${CUSTOM_FACT_EXTRACTION_PROMPT:-}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION_NAME: memories
      HISTORY_DB_PATH: /app/history/history.db
      CORS_ORIGINS: "*"
    depends_on:
      - qdrant
    volumes:
      - ${DATA_PATH}/mem0/history:/app/history
      - ${DATA_PATH}/mem0/logs:/app/logs
    networks:
      - 1panel-network
    labels:
      createdBy: "Apps"

  mem0-webui:
    image: mem0-webui:latest
    container_name: mem0-webui
    restart: unless-stopped
    ports:
      - "3001:3000"  # 防混叠：转移到 3001
    environment:
      NEXT_PUBLIC_API_URL: http://mem0-api:8000
      NEXT_PUBLIC_USER_ID: ${NEXT_PUBLIC_USER_ID:-user}
    depends_on:
      - mem0-api
    networks:
      - 1panel-network
    labels:
      createdBy: "Apps"

  # ==========================================
  # CozyMemobase 核心服务群
  # ==========================================

  memobase-server-api:
    image: memobase-server:latest
    restart: unless-stopped
    container_name: memobase-server-api
    environment:
      DATABASE_URL: postgresql://memobase:memobase123@postgres:5432/memobase
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1  # 使用 DB 1
      ACCESS_TOKEN: secret
      PROJECT_ID: default
      API_HOSTS: "http://localhost:8019,http://127.0.0.1:8019,http://memobase-server-api:8000"
      USE_CORS: "true"
      MEMOBASE_LANGUAGE: zh
      MEMOBASE_LLM_STYLE: openai
      MEMOBASE_EMBEDDING_PROVIDER: openai
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
      - redis
    ports:
      - '8019:8000'
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m
    volumes:
      - ./conf/config.yaml:/app/config.yaml:ro
    networks:
      - 1panel-network
    labels:
      createdBy: "Apps"

  # ==========================================
  # CozyCognee 核心服务群
  # ==========================================

  cognee:
    image: cognee:0.4.1
    container_name: cognee
    restart: unless-stopped
    ports:
      - "8000:8000"
    mem_limit: 2g
    mem_reservation: 512m
    deploy:
      resources:
        limits:
          memory: 2g
        reservations:
          memory: 512m
    environment:
      - DEBUG=false
      - ENVIRONMENT=production
      - LOG_LEVEL=DEBUG
      - HOST=0.0.0.0
      - HTTP_PORT=8000
      - PYTHONUNBUFFERED=1
      - LLM_API_KEY=${COGNEE_LLM_API_KEY}
      - LLM_PROVIDER=openai
      - LLM_MODEL=gpt-4o-mini
      - LLM_ENDPOINT=https://api.openai.com/v1
      - LLM_MAX_TOKENS=16384
      - EMBEDDING_PROVIDER=openai
      - EMBEDDING_API_KEY=${COGNEE_EMBEDDING_API_KEY}
      - EMBEDDING_ENDPOINT=https://api.openai.com/v1
      - EMBEDDING_MODEL=text-embedding-3-large
      - EMBEDDING_DIMENSIONS=3072
      - DATABASE_URL=postgresql://cognee_user:cognee_password@postgres:5432/cognee_db
      - DB_PROVIDER=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=cognee_db
      - DB_USERNAME=cognee_user
      - DB_PASSWORD=cognee_password
      - VECTOR_DB_PROVIDER=pgvector
      - VECTOR_DB_URL=postgresql://cognee_user:cognee_password@postgres:5432/cognee_db
      - GRAPH_DATABASE_PROVIDER=neo4j
      - GRAPH_DATABASE_NAME=neo4j
      - GRAPH_DATABASE_URL=bolt://neo4j:7687
      - GRAPH_DATABASE_USERNAME=neo4j
      - GRAPH_DATABASE_PASSWORD=pleaseletmein
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0  # 使用 DB 0
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=minioadmin
      - S3_SECRET_KEY=minioadmin
      - S3_BUCKET_NAME=cognee-storage
      - S3_USE_SSL=false
      - CORS_ALLOWED_ORIGINS=*
      - EXTRAS=api,postgres,neo4j
      - TELEMETRY_DISABLED=1
      - DEFAULT_USER_EMAIL=admin@cognee.com
      - DEFAULT_USER_PASSWORD=passw0rd
    depends_on:
      - postgres
      - redis
      - neo4j
      - minio
    volumes:
      - ${DATA_PATH}/cognee/data:/app/data
      - ${DATA_PATH}/cognee/logs:/app/logs
    networks:
      - 1panel-network
    labels:
      createdBy: "Apps"
    deploy:
      resources:
        limits:
          memory: 2g
        reservations:
          memory: 512m

  cognee-mcp-api:
    image: cognee-mcp:api-0.4.1
    container_name: cognee-mcp-api
    restart: unless-stopped
    environment:
      - DEBUG=false
      - ENVIRONMENT=production
      - PYTHONUNBUFFERED=1
      - TRANSPORT_MODE=sse
      - MCP_LOG_LEVEL=INFO
      - API_URL=http://cognee:8000
      - CORS_ALLOWED_ORIGINS=*
    depends_on:
      - cognee
    volumes:
      - ${DATA_PATH}/cognee/mcp-api:/app/data
    networks:
      - 1panel-network
    labels:
      createdBy: "Apps"

  cognee-frontend:
    image: cognee-frontend:0.4.1
    container_name: cognee-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_BACKEND_API_URL=http://cognee:8000
      - NEXT_PUBLIC_IS_CLOUD_ENVIRONMENT=false
      - NEXT_DISABLE_DEV_INDICATORS=true
    networks:
      - 1panel-network
    labels:
      createdBy: "Apps"

  # 如果需要内部汇集路由，启用以下子 Nginx，同时 1Panel 主机监听 8080 防止与主 OpenResty 冲突
  cognee_nginx:
    image: nginx:alpine
    container_name: cognee_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ${DATA_PATH}/cognee/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ${DATA_PATH}/cognee/nginx/logs:/var/log/nginx
    depends_on:
      - cognee
      - cognee-mcp-api
    networks:
      - 1panel-network
    labels:
      createdBy: "Apps"

networks:
  1panel-network:
    external: true
