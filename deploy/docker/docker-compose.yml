version: '3.8'

# CozyMemory 开发环境 Docker Compose 配置
# 包含：Redis, PostgreSQL, Memobase, Mem0, Cognee

services:
  # ==================== 基础设施 ====================
  
  # Redis 缓存层
  redis:
    image: redis:7-alpine
    container_name: cozy-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cozy-network
    deploy:
      resources:
        limits:
          memory: 512M

  # PostgreSQL (Memobase 存储)
  postgres:
    image: postgres:15-alpine
    container_name: cozy-postgres
    environment:
      POSTGRES_USER: cozy
      POSTGRES_PASSWORD: cozy_password_2026
      POSTGRES_DB: cozy_memory
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cozy -d cozy_memory"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cozy-network
    deploy:
      resources:
        limits:
          memory: 1G

  # ==================== 记忆引擎 ====================
  
  # Memobase (用户画像引擎)
  memobase:
    image: memodb/memobase:latest
    container_name: cozy-memobase
    environment:
      DATABASE_URL: postgresql://cozy:cozy_password_2026@postgres:5432/cozy_memory
      REDIS_URL: redis://redis:6379
      API_KEY: memobase_dev_key_2026
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cozy-network
    deploy:
      resources:
        limits:
          memory: 2G
    # 注意：Memobase 可能需要手动部署，这里是占位配置

  # Mem0 (对话记忆引擎)
  mem0:
    image: mem0/mem0:latest
    container_name: cozy-mem0
    environment:
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-placeholder}
      VECTOR_STORE: qdrant
      QDRANT_URL: http://qdrant:6333
    ports:
      - "8002:8000"
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - cozy-network
    deploy:
      resources:
        limits:
          memory: 2G
    # 注意：Mem0 可能需要手动部署，这里是占位配置

  # Qdrant (Mem0 向量存储)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: cozy-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - cozy-network
    deploy:
      resources:
        limits:
          memory: 2G

  # Cognee (知识图谱引擎)
  cognee:
    image: cognee/cognee:latest
    container_name: cozy-cognee
    environment:
      NEO4J_URI: neo4j://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: neo4j_password_2026
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-placeholder}
    ports:
      - "8003:8000"
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - cozy-network
    deploy:
      resources:
        limits:
          memory: 2G
    # 注意：Cognee 可能需要手动部署，这里是占位配置

  # Neo4j (Cognee 图谱存储)
  neo4j:
    image: neo4j:5
    container_name: cozy-neo4j
    environment:
      NEO4J_AUTH: neo4j/neo4j_password_2026
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "wget", "-O", "/dev/null", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - cozy-network
    deploy:
      resources:
        limits:
          memory: 2G

  # ==================== 监控 ====================
  
  # Prometheus (监控指标)
  prometheus:
    image: prom/prometheus:latest
    container_name: cozy-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - cozy-network
    deploy:
      resources:
        limits:
          memory: 512M

  # Grafana (可视化)
  grafana:
    image: grafana/grafana:latest
    container_name: cozy-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: grafana_admin_2026
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./deploy/monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - cozy-network
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  cozy-network:
    driver: bridge

volumes:
  redis_data:
  postgres_data:
  qdrant_data:
  neo4j_data:
  prometheus_data:
  grafana_data:
