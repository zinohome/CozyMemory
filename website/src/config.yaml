site:
  name: CozyMemory
  site: 'https://zinohome.github.io'
  base: '/CozyMemory'
  trailingSlash: false

metadata:
  title:
    default: CozyMemory
    template: '%s — CozyMemory'
  description: 'Unified AI Memory for Every LLM App — One API to rule three memory engines: conversations, profiles, and knowledge graphs.'
  robots:
    index: true
    follow: true
  openGraph:
    site_name: CozyMemory
    type: website

i18n:
  language: en
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6
    post:
      permalink: '/%slug%'
    list:
      pathname: 'blog'
    category:
      pathname: 'category'
    tag:
      pathname: 'tag'
    isRelatedPostsEnabled: true
    relatedPostsCount: 4

ui:
  theme: 'system'
