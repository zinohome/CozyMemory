syntax = "proto3";
package cozymemory;

import "common.proto";

message InsertProfileRequest {
  string user_id = 1;
  repeated Message messages = 2;
  bool sync = 3;
}

message InsertProfileResponse {
  bool success = 1;
  string user_id = 2;
  string blob_id = 3;
  string message = 4;
}

message FlushProfileRequest {
  string user_id = 1;
  bool sync = 2;
}

message FlushProfileResponse {
  bool success = 1;
  string message = 2;
}

message ProfileTopic {
  string id = 1;
  string topic = 2;
  string sub_topic = 3;
  string content = 4;
  string created_at = 5;
  string updated_at = 6;
}

message UserProfile {
  string user_id = 1;
  repeated ProfileTopic topics = 2;
  string updated_at = 3;
}

message GetProfileRequest {
  string user_id = 1;
}

message GetContextRequest {
  string user_id = 1;
  int32 max_token_size = 2;
  repeated Message chats = 3;
}

message GetContextResponse {
  bool success = 1;
  string user_id = 2;
  string context = 3;
}

service ProfileService {
  rpc InsertProfile(InsertProfileRequest) returns (InsertProfileResponse);
  rpc FlushProfile(FlushProfileRequest) returns (FlushProfileResponse);
  rpc GetProfile(GetProfileRequest) returns (UserProfile);
  rpc GetContext(GetContextRequest) returns (GetContextResponse);
}